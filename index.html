<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Did you miss out on Cursor? · Missed-DM generator</title>
    <meta
      name="description"
      content="Make your own 'Missed on Cursor' DM regret screenshot and share it to X."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Check your DMs" />
    <meta property="og:title" content="Did you miss out on Cursor?" />

      property="og:description"
      content="Pick the pitch from Michael, pick your reply, and post the cope. Make your own 'Missed on Cursor' DM."
    />
    <meta property="og:image" content="https://check-your-dms.vercel.app/og-v3.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Did you miss out on Cursor?" />
    <meta
      name="twitter:description"
      content="Make your own 'Missed on Cursor' DM regret screenshot."
    />
    <meta name="twitter:image" content="https://check-your-dms.vercel.app/og-v3.png" />
    <meta name="twitter:creator" content="@hackpravj" />
  </head>
  <body>
    <script>
      // No-flash theme init: set .dark before first paint.
      (function () {
        try {
          var t = localStorage.getItem('theme')
          var dark =
            t === 'dark' ||
            ((t === 'system' || !t) &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
